name: Security Scan

on:
  workflow_dispatch:
    inputs:
      scanner:
        description: 'Scanner to start (semgrep, bandit, nodejsscan, gitleaks, gosec, hadolint, trivy, all)'
        required: true
        default: 'all'
      repo_url:
        description: 'Repository for scanning (self for current, or full URL of external repo)'
        required: true
        default: 'self'
      branch:
        description: 'Branch of external repo (if repo_url is not self)'
        required: false
        default: 'main'
      mode:
        description: 'Scanning mode (full or incremental)'
        required: false
        default: 'full'

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      SCANNER: ${{ inputs.scanner }}
      REPO_URL: ${{ inputs.repo_url }}
      BRANCH: ${{ inputs.branch }}
      SCAN_MODE: ${{ inputs.mode }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone external repo if needed
        run: |
          if [ "$REPO_URL" != "self" ]; then
            git clone --branch "$BRANCH" --depth 1 "$REPO_URL" external-repo
            echo "SCAN_CODE_DIR=external-repo" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Set scan directory
        run: |
          if [ "$REPO_URL" = "self" ]; then
            echo "SCAN_CODE_DIR=." >> $GITHUB_ENV
          else
            echo "SCAN_CODE_DIR=external-repo" >> $GITHUB_ENV
          fi

      - name: Prepare reports directory
        run: |
          mkdir -p reports
          sudo chown -R 10001:10001 reports
          sudo chmod -R 777 reports 

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run scanner
        run: |
          IMAGE_PATH=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" | tr '[:upper:]' '[:lower:]')
          
          docker run --rm \
            -v "${PWD}/$SCAN_CODE_DIR:/scan-target:ro" \
            -v "${PWD}/reports:/scanner/reports" \
            -e SCAN_DIR=/scan-target \
            -e TOOL="$SCANNER" \
            -e SCAN_MODE="$SCAN_MODE" \
            $IMAGE_PATH

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ inputs.scanner }}
          path: reports/
          retention-days: 7

      - name: Summary
        run: |
          echo "Scan completed for scanner: $SCANNER"
          echo "Repo: $REPO_URL"
          echo "Reports uploaded as artifact: security-reports-$SCANNER"
